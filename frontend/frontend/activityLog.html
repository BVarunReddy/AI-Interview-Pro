<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activity Log — InterviewPro</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <style>
      .log-row {
        display: flex; align-items: flex-start; gap: 14px;
        padding: 14px 0; border-bottom: 1px solid var(--border);
      }
      .log-row:last-child { border-bottom: none; }
      .log-icon {
        width: 36px; height: 36px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 14px; flex-shrink: 0; margin-top: 2px;
      }
      .log-body { flex: 1; min-width: 0; }
      .log-action { font-size: 14px; font-weight: 600; }
      .log-detail { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
      .log-meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; display: flex; gap: 10px; flex-wrap: wrap; }
      .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
    </style>
  </head>
  <body>
    <div class="sidebar" id="sidebar"></div>
    <div class="main">
      <div class="navbar" id="navbar"></div>
      <div class="page-content">

        <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
          <div>
            <h1>Activity Log</h1>
            <p>Full audit trail of all actions taken in the system</p>
          </div>
          <button class="btn btn-outline btn-sm" onclick="loadLogs()">
            <i class="fa fa-rotate"></i> Refresh
          </button>
        </div>

        <div class="filter-bar">
          <select id="entityFilter" class="form-control" style="width:auto" onchange="loadLogs()">
            <option value="all">All Activity</option>
            <option value="candidate">Candidates</option>
            <option value="interview">Interviews</option>
            <option value="feedback">Feedback</option>
            <option value="user">User Logins</option>
          </select>
          <select id="userFilter" class="form-control" style="width:auto" onchange="loadLogs()">
            <option value="">All Users</option>
          </select>
          <select id="limitFilter" class="form-control" style="width:auto" onchange="loadLogs()">
            <option value="25">Last 25</option>
            <option value="50" selected>Last 50</option>
            <option value="100">Last 100</option>
            <option value="200">Last 200</option>
          </select>
          <span id="logCount" style="font-size:13px;color:var(--text-muted);margin-left:auto"></span>
        </div>

        <div class="card" id="logCard">
          <div style="text-align:center;padding:40px;color:var(--text-muted)">
            <i class="fa fa-spinner fa-spin" style="font-size:24px"></i>
          </div>
        </div>

      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/toast.js"></script>
    <script>
      const ICON_MAP = {
        "Added Candidate":        { icon: "fa-user-plus",         bg: "#ede9fe", color: "#5b21b6" },
        "Status Changed":         { icon: "fa-arrows-rotate",     bg: "#dbeafe", color: "#1d4ed8" },
        "Deleted Candidate":      { icon: "fa-user-minus",        bg: "#fee2e2", color: "#991b1b" },
        "Scheduled Interview":    { icon: "fa-calendar-plus",     bg: "#d1fae5", color: "#047857" },
        "Interview Status Updated":{ icon: "fa-calendar-check",   bg: "#d1fae5", color: "#047857" },
        "Deleted Interview":      { icon: "fa-calendar-xmark",    bg: "#fee2e2", color: "#991b1b" },
        "Submitted Feedback":     { icon: "fa-comment-dots",      bg: "#fef3c7", color: "#b45309" },
        "Logged In":              { icon: "fa-right-to-bracket",  bg: "#f1f5f9", color: "#475569" },
      };

      function timeAgo(dateStr) {
        const diff = (Date.now() - new Date(dateStr)) / 1000;
        if (diff < 60)   return "just now";
        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
        if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
        return new Date(dateStr).toLocaleDateString("en-US", { day:"numeric", month:"short", year:"numeric" });
      }

      function fullDate(dateStr) {
        return new Date(dateStr).toLocaleString("en-US", {
          day: "numeric", month: "short", year: "numeric",
          hour: "2-digit", minute: "2-digit",
        });
      }

      let usersLoaded = false;

      async function loadLogs() {
        const entity = document.getElementById("entityFilter").value;
        const userId = document.getElementById("userFilter").value;
        const limit  = document.getElementById("limitFilter").value;
        const card   = document.getElementById("logCard");

        card.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-muted)"><i class="fa fa-spinner fa-spin" style="font-size:24px"></i></div>`;

        const params = new URLSearchParams({ limit });
        if (entity !== "all") params.set("entity", entity);
        if (userId) params.set("user_id", userId);

        const res = await API.get(`/dashboard/activity?${params}`);
        if (!res || !res.ok) {
          card.innerHTML = `<div style="padding:24px;color:#ef4444">Failed to load activity log.</div>`;
          return;
        }

        const { logs, users } = res.data;

        // Populate user filter once
        if (!usersLoaded && users.length) {
          const sel = document.getElementById("userFilter");
          users.forEach(u => {
            const opt = document.createElement("option");
            opt.value = u.user_id;
            opt.textContent = u.user_name;
            sel.appendChild(opt);
          });
          usersLoaded = true;
        }

        document.getElementById("logCount").textContent =
          `${logs.length} entr${logs.length !== 1 ? "ies" : "y"}`;

        if (!logs.length) {
          card.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon"><i class="fa fa-clock-rotate-left"></i></div>
              <div class="empty-title">No activity yet</div>
              <div class="empty-desc">Actions will appear here as your team uses the system.</div>
            </div>`;
          return;
        }

        card.innerHTML = logs.map(log => {
          const { icon, bg, color } = ICON_MAP[log.action] || { icon: "fa-circle-dot", bg: "#f1f5f9", color: "#475569" };
          return `
            <div class="log-row">
              <div class="log-icon" style="background:${bg};color:${color}">
                <i class="fa ${icon}"></i>
              </div>
              <div class="log-body">
                <div class="log-action">${log.action}</div>
                <div class="log-detail">${log.details || "—"}</div>
                <div class="log-meta">
                  <span><i class="fa fa-user" style="opacity:.5"></i> ${log.user_name}</span>
                  <span title="${fullDate(log.created_at)}"><i class="fa fa-clock" style="opacity:.5"></i> ${timeAgo(log.created_at)}</span>
                  <span style="opacity:.5;text-transform:capitalize">${log.entity}</span>
                </div>
              </div>
            </div>`;
        }).join("");
      }

      document.addEventListener("DOMContentLoaded", () => {
        if (!Auth.requireAuth()) return;
        initDarkMode();
        initUI("activityLog.html", "");
        loadLogs();
      });
    </script>
  </body>
</html>
